<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Run Registration</title>
    <link rel="stylesheet" href="css/style.css">
 
    <!-- Supabase JS CDN — no backend needed -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 
<div class="container">
    <a href="index.html" class="back-btn">← Back to Home</a>
    <h2>Your Information</h2>
 
    <div id="message"></div>
 
    <form id="regForm">
        <div class="form-row">
            <div class="form-col" style="flex: 2;">
                <label class="form-label">Full Name <span style="color: red;">*</span></label>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <input type="text" id="firstName" required placeholder="e.g. Juan">
                        <div class="sub-label">First Name</div>
                    </div>
                    <div style="flex: 1;">
                        <input type="text" id="lastName" required placeholder="e.g. Dela Cruz">
                        <div class="sub-label">Last Name</div>
                    </div>
                </div>
            </div>
            <div class="form-col" style="flex: 1;">
                <label class="form-label" for="age">Age <span style="color: red;">*</span></label>
                <input type="number" id="age" required min="1" placeholder="e.g. 25">
            </div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <label class="form-label">Run or Walk</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="run_or_walk" value="Runner" checked> Runner</label>
                    <label class="radio-label"><input type="radio" name="run_or_walk" value="Walker"> Walker</label>
                </div>
            </div>
            <div class="form-col"></div>
        </div>

        <div class="form-row">
            <div class="form-col">
                <label class="form-label" for="email">E-mail <span style="color: red;">*</span></label>
                <input type="email" id="email" required placeholder="ex: myname@example.com">
                <div class="sub-label">example@example.com</div>
            </div>
            <div class="form-col">
                <label class="form-label" for="phone">Contact Number <span style="color: red;">*</span></label>
                <input type="tel" id="phone" required placeholder="+63 912 345 6789">
            </div>
        </div>

        <div class="form-row">
            <div class="form-col" style="flex: 1;">
                <label class="form-label" for="shirt_size">Shirt Size <span style="color: red;">*</span></label>
                <select id="shirt_size" required>
                    <option value="" disabled selected>Please Select</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
            </div>
            <div class="form-col" style="flex: 1;"></div>
        </div>

        <div class="form-group" style="margin-top: 30px;">
            <label class="form-label">Billing Address <span style="color: red;">*</span></label>
            <div style="margin-bottom: 15px;">
                <input type="text" id="street" required placeholder="e.g. 123 Rizal Avenue">
                <div class="sub-label">Street Address</div>
            </div>
            <div style="margin-bottom: 15px;">
                <input type="text" id="street2" placeholder="e.g. Unit 4B, Tower 1 (Optional)">
                <div class="sub-label">Street Address Line 2</div>
            </div>
            <div class="form-row" style="margin-bottom: 15px;">
                <div class="form-col">
                    <input type="text" id="city" required placeholder="e.g. Manila">
                    <div class="sub-label">City</div>
                </div>
                <div class="form-col">
                    <input type="text" id="state" required placeholder="e.g. Metro Manila">
                    <div class="sub-label">State / Province</div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <input type="text" id="postal" required placeholder="e.g. 1000">
                    <div class="sub-label">Postal / Zip Code</div>
                </div>
                <div class="form-col">
                    <select id="country" required>
                        <option value="Philippines" selected>Philippines</option>
                    </select>
                    <div class="sub-label">Country</div>
                </div>
            </div>
        </div>


 
        <button type="submit">Next</button>
    </form>
</div>
 
<script>

    const SUPABASE_URL  = "https://wsdtpgwfdmnxvzfnaxxs.supabase.co";
    const SUPABASE_ANON = "sb_publishable_MCjfUBNehXZH__zqNi2wwg_7282auSG";
 
    const { createClient } = supabase;
    const supabaseClient   = createClient(SUPABASE_URL, SUPABASE_ANON);
 
   
    document.getElementById('regForm').addEventListener('submit', async function(e) {
        e.preventDefault();
 
        const msgDiv = document.getElementById('message');
        msgDiv.style.display = 'none';
 
        const first_name  = document.getElementById('firstName').value.trim();
        const last_name   = document.getElementById('lastName').value.trim();
        const full_name   = first_name + " " + last_name;
        const age         = document.getElementById('age').value.trim();
        const run_or_walk = document.querySelector('input[name="run_or_walk"]:checked').value;
        const email       = document.getElementById('email').value.trim();
        const phone       = document.getElementById('phone').value.trim();
        const shirt_size  = document.getElementById('shirt_size').value;
        const street      = document.getElementById('street').value.trim();
        const street2     = document.getElementById('street2').value.trim();
        const city        = document.getElementById('city').value.trim();
        const state       = document.getElementById('state').value.trim();
        const postal      = document.getElementById('postal').value.trim();
        const country     = document.getElementById('country').value.trim();
        
    
        const address = `${street}, ${street2 ? street2 + ', ' : ''}${city}, ${state} ${postal}, ${country}`;

        const btn    = document.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = 'Processing...';
 
   
        const { data, error } = await supabaseClient
            .from('participants')
            .insert([{ 
                full_name, 
                email, 
                phone, 
                category: run_or_walk, 
                shirt_size,
                address
            }]);
 
        btn.disabled  = false;
        btn.innerText = 'Next';
 
        msgDiv.style.display = 'block';
 
        if (error) {
            msgDiv.className = 'error';
            msgDiv.innerText = 'Registration failed: ' + error.message;
            console.error('Supabase error:', error);
        } else {
            msgDiv.className = 'success';
            msgDiv.innerHTML = 'Registration successful! <br><br> <a href="admin.html" class="nav-link" style="margin-top:0;">View Registered Runners →</a>';
            document.getElementById('regForm').reset();
            document.getElementById('regForm').style.display = 'none';
        }
    });
</script>
 
</body>
</html>
