<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Run Registration</title>
    <link rel="stylesheet" href="css/style.css">
 
    <!-- Supabase JS CDN — no backend needed -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 
<div class="container">
    <h2>🏃‍♂️ Fun Run Registration</h2>
 
    <div id="message"></div>
 
    <form id="regForm">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" required placeholder="John Doe">
        </div>
 
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com">
        </div>
 
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required placeholder="09123456789">
        </div>
 
        <div class="form-group">
            <label for="category">Race Category</label>
            <select id="category" required>
                <option value="" disabled selected>Select your distance</option>
                <option value="3K">3K Fun Run</option>
                <option value="5K">5K Power Run</option>
                <option value="10K">10K Marathon Challenge</option>
            </select>
        </div>
 
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" required placeholder="e.g. 25" min="5">
        </div>
 
        <div class="form-group">
            <label>Run or Walk</label>
            <div style="display: flex; gap: 15px; margin-top: 5px;">
                <label style="font-weight: normal;"><input type="radio" name="run_or_walk" value="Runner" checked> Runner</label>
                <label style="font-weight: normal;"><input type="radio" name="run_or_walk" value="Walker"> Walker</label>
            </div>
        </div>
 
        <div class="form-group">
            <label for="shirt_size">Shirt Size</label>
            <select id="shirt_size" required>
                <option value="" disabled selected>Please Select</option>
                <option value="XS">Extra Small (XS)</option>
                <option value="S">Small (S)</option>
                <option value="M">Medium (M)</option>
                <option value="L">Large (L)</option>
                <option value="XL">Extra Large (XL)</option>
                <option value="XXL">Double XL (XXL)</option>
            </select>
        </div>
 
        <button type="submit">Register Now</button>
    </form>
 
    <a href="admin.html" class="nav-link">View Registered Runners →</a>
</div>
 
<script>
    // =============================================
    // Supabase Direct Connection (No backend needed)
    // =============================================
    const SUPABASE_URL  = "https://wsdtpgwfdmnxvzfnaxxs.supabase.co";
    const SUPABASE_ANON = "sb_publishable_MCjfUBNehXZH__zqNi2wwg_7282auSG";
 
    const { createClient } = supabase;
    const supabaseClient   = createClient(SUPABASE_URL, SUPABASE_ANON);
 
    // =============================================
    // AJAX POST — Insert participant via Supabase JS
    // =============================================
    document.getElementById('regForm').addEventListener('submit', async function(e) {
        e.preventDefault();
 
        const msgDiv = document.getElementById('message');
        msgDiv.style.display = 'none';
 
        const full_name = document.getElementById('fullName').value.trim();
        const email     = document.getElementById('email').value.trim();
        const phone     = document.getElementById('phone').value.trim();
        const category  = document.getElementById('category').value;
        const age         = document.getElementById('age').value.trim();
        const run_or_walk = document.querySelector('input[name="run_or_walk"]:checked').value;
        const shirt_size  = document.getElementById('shirt_size').value;
 
        // Client-side validation
        if (!full_name || !email || !phone || !category || !age || !shirt_size) {
            msgDiv.style.display = 'block';
            msgDiv.className     = 'error';
            msgDiv.innerText     = 'All fields are required.';
            return;
        }
 
        // Disable button to prevent double submission
        const btn    = document.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = 'Registering...';
 
        // AJAX INSERT via Supabase JS client
        const { data, error } = await supabaseClient
            .from('participants')
            .insert([{ full_name, email, phone, category, age, run_or_walk, shirt_size }]);
 
        btn.disabled  = false;
        btn.innerText = 'Register Now';
 
        msgDiv.style.display = 'block';
 
        if (error) {
            msgDiv.className = 'error';
            msgDiv.innerText = 'Registration failed: ' + error.message;
            console.error('Supabase error:', error);
        } else {
            msgDiv.className = 'success';
            msgDiv.innerText = 'Registration successful! See you at the race! 🏁';
            document.getElementById('regForm').reset();
        }
    });
</script>
 
</body>
</html>
