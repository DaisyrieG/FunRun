<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Runners Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container wide-container">
    <h2>🏅 Registered Runners Dashboard</h2>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Category</th>
                <th>Registration Date</th>
            </tr>
        </thead>
        <tbody id="runnersTableBody">
            <tr>
                <td colspan="6" style="text-align: center;">Loading runners...</td>
            </tr>
        </tbody>
    </table>

    <a href="index.html" class="nav-link">← Back to Registration Form</a>
</div>

<script>
    // Absolute path targeting your decoupled XAMPP backend API
    const API_URL = "http://localhost/fun-run/backend/api.php";

    document.addEventListener("DOMContentLoaded", function() {
        const tableBody = document.getElementById('runnersTableBody');

        // AJAX GET Request via Fetch
        fetch(API_URL)
        .then(response => response.json())
        .then(data => {
            tableBody.innerHTML = ''; 

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No runners registered yet.</td></tr>`;
                return;
            }

            data.forEach(runner => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${runner.id}</td>
                    <td>${runner.full_name}</td>
                    <td>${runner.email}</td>
                    <td>${runner.phone}</td>
                    <td><strong>${runner.category}</strong></td>
                    <td>${new Date(runner.created_at).toLocaleString()}</td>
                `;
                tableBody.appendChild(row);
            });
        })
        .catch(error => {
            tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #f43f5e;">Failed to fetch dashboard data.</td></tr>`;
            console.error('Error tracking data:', error);
        });
    });
</script>

</body>
</html>
