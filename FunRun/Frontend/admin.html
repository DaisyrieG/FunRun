<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Runners Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Supabase JS CDN — no backend needed -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container wide-container">
    <h2>🏅 Registered Runners Dashboard</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Category</th>
                <th>Age</th>
                <th>Type</th>
                <th>Shirt Size</th>
                <th>Address</th>
                <th>Additional</th>
                <th>Registration Date</th>
            </tr>
        </thead>
        <tbody id="runnersTableBody">
            <tr>
                <td colspan="11" style="text-align: center;">Loading runners...</td>
            </tr>
        </tbody>
    </table>

    <a href="index.html" class="nav-link">← Back to Registration Form</a>
</div>

<script>
    // =============================================
    // Supabase Direct Connection (No backend needed)
    // =============================================
    const SUPABASE_URL  = "https://wsdtpgwfdmnxvzfnaxxs.supabase.co";
    const SUPABASE_ANON = "sb_publishable_MCjfUBNehXZH__zqNi2wwg_7282auSG";

    const { createClient } = supabase;
    const supabaseClient   = createClient(SUPABASE_URL, SUPABASE_ANON);

    // =============================================
    // AJAX GET — Fetch all participants via Supabase JS
    // =============================================
    document.addEventListener("DOMContentLoaded", async function () {
        const tableBody = document.getElementById('runnersTableBody');

        const { data, error } = await supabaseClient
            .from('participants')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="11" style="text-align:center; color:#f43f5e;">
                        Failed to load runners: ${error.message}
                    </td>
                </tr>`;
            console.error('Supabase error:', error);
            return;
        }

        if (!data || data.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="11" style="text-align:center;">
                        No runners registered yet.
                    </td>
                </tr>`;
            return;
        }

        tableBody.innerHTML = '';
        data.forEach(runner => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${runner.id}</td>
                <td>${runner.full_name}</td>
                <td>${runner.email}</td>
                <td>${runner.phone}</td>
                <td><strong>${runner.category}</strong></td>
                <td>${runner.age || '-'}</td>
                <td>${runner.run_or_walk || '-'}</td>
                <td>${runner.shirt_size || '-'}</td>
                <td>${runner.address || '-'}</td>
                <td>${runner.additional_entries || '-'}</td>
                <td>${new Date(runner.created_at).toLocaleString()}</td>
            `;
            tableBody.appendChild(row);
        });
    });
</script>

</body>
</html>
